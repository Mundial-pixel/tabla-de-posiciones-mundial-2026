<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Resultados y Posiciones En Vivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

       .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        #idioma {
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            color: #764ba2;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

       .mensaje-venezuela {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin: 15px 0;
            border-radius: 5px;
            font-size: 14px;
        }

       .partido {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

       .estado-vivo {
            color: #dc3545;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

       .estado-final {
            color: #6c757d;
            font-weight: bold;
        }

       .goles {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
            font-size: 13px;
        }

       .goles p {
            margin: 5px 0;
        }

       .listas-clasificacion {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

       .lista-clasificados,.lista-eliminados {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

       .lista-clasificados h3 {
            color: #28a745;
            margin-top: 0;
            font-size: 18px;
        }

       .lista-eliminados h3 {
            color: #dc3545;
            margin-top: 0;
            font-size: 18px;
        }

       .equipos-grid {
            display: grid;
            gap: 8px;
        }

       .equipo-clasificado,.equipo-eliminado {
            background: white;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #28a745;
            font-size: 14px;
        }

       .equipo-eliminado {
            border-left-color: #dc3545;
            opacity: 0.7;
        }

       .equipo-clasificado span,.equipo-eliminado span {
            font-size: 12px;
            color: #666;
        }

       .grupo-tabla {
            margin-bottom: 30px;
            overflow-x: auto;
        }

       .grupo-tabla h3 {
            background: #667eea;
            color: white;
            padding: 10px;
            border-radius: 8px 8px 0 0;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
        }

        th {
            background: #e9ecef;
            font-weight: 600;
        }

        tr.clasificado {
            background: #d4edda;
        }

        tr.eliminado {
            background: #f8d7da;
            opacity: 0.7;
        }

       .botones-donar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

       .botones-donar button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #28a745;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

       .botones-donar button:hover {
            background: #218838;
        }

        footer {
            background: #343a40;
            color: white;
            text-align: center;
            padding: 15px;
            margin: 30px -25px -25px -25px;
            border-radius: 0 0 15px 15px;
            font-size: 13px;
        }

        @media (max-width: 768px) {
           .listas-clasificacion {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 22px;
            }

            th, td {
                padding: 6px 4px;
                font-size: 12px;
            }
        }
    </style>
</head>

        let idiomaActual = navigator.language.split('-')[0];
        if (!traducciones[idiomaActual]) idiomaActual = 'es';

        function t(clave) {
            return traducciones[idiomaActual][clave] || traducciones['es'][clave];
        }

        function cambiarIdioma() {
            idiomaActual = document.getElementById('idioma').value;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const clave = el.getAttribute('data-i18n');
                el.textContent = t(clave);
            });
            document.title = t('titulo');
            mostrarResultados();
            mostrarProximosPartidos();
            mostrarTablaPosiciones();
        }

        const resultsDiv = document.getElementById('results');
        const upcomingDiv = document.getElementById('upcoming');
        const groupsDiv = document.getElementById('groups');

        const ESPN_URL = 'https://corsproxy.io/?https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
        const ESPN_GROUPS_URL = 'https://corsproxy.io/?https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/standings';

        async function mostrarResultados() {
            try {
                resultsDiv.innerHTML = t('cargando');
                const res = await fetch(ESPN_URL);
                const data = await res.json();

                if (!data.events || data.events.length === 0) {
                    resultsDiv.innerHTML = `<p>${t('noPartidos')}</p>`;
                    return;
                }

                resultsDiv.innerHTML = data.events.map(match => {
                    try {
                        const comp = match.competitions[0];
                        const home = comp.competitors.find(t => t.homeAway === 'home');
                        const away = comp.competitors.find(t => t.homeAway === 'away');
                        const status = match.status.type;

                        const horaPartido = new Date(match.date).toLocaleTimeString(idiomaActual === 'en'? 'en-US' : idiomaActual === 'de'? 'de-DE' : idiomaActual === 'pt'? 'pt-BR' : 'es-VE', {
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        let estadoClase = '';
                        let estadoTexto = status.description || t('programado');

                        if (status.state === 'in') {
                            estadoClase = 'estado-vivo';
                            const reloj = status.displayClock || t('enJuego');
                            estadoTexto = `${t('enVivo')} ${reloj}`;
                        } else if (status.state === 'post') {
                            estadoClase = 'estado-final';
                            estadoTexto = t('finalizado');
                        } else if (status.state === 'pre') {
                            estadoTexto = `${t('programado')} ${horaPartido}`;
                        }

                        let golesHTML = '';
                        if (comp.details && Array.isArray(comp.details)) {
                            const goles = comp.details.filter(d => d && d.scoringPlay === true && d.clock && d.clock.displayValue);

                            if (goles.length > 0) {
                                golesHTML = `
                                    <div class="goles">
                                        <strong>${t('goles')}</strong>
                                        ${goles.map(gol => {
                                            let jugador = t('jugador');
                                            if (gol.athletesInvolved && gol.athletesInvolved[0] && gol.athletesInvolved[0].displayName) {
                                                jugador = gol.athletesInvolved[0].displayName;
                                            }

                                            let equipoGol = t('equipo');
                                            if (gol.team && gol.team.id) {
                                                if (gol.team.id === home.team.id) {
                                                    equipoGol = home.team.displayName;
                                                } else if (gol.team.id === away.team.id) {
                                                    equipoGol = away.team.displayName;
                                                } else if (gol.team.displayName) {
                                                    equipoGol = gol.team.displayName;
                                                }
                                            }

                                            return `<p>⚽ ${gol.clock.displayValue}' - ${equipoGol}: ${jugador}</p>`;
                                        }).join('')}
                                    </div>
                                `;
                            }
                        }

                        let faseTexto = t('faseGrupos');
                        const fechaPartido = new Date(match.date);
                        const inicio16avos = new Date('2026-06-28');
                        const inicioCuartos = new Date('2026-07-04');
                        const inicioSemis = new Date('2026-07-08');
                        const inicioFinal = new Date('2026-07-12');

                        if (comp.notes && comp.notes[0] && comp.notes[0].headline) {
                            faseTexto = comp.notes[0].headline;
                        }
                        else if (comp.type && comp.type.text) {
                            faseTexto = comp.type.text;
                        }
                        else if (fechaPartido >= inicioFinal) {
                            faseTexto = t('final');
                        }
                        else if (fechaPartido >= inicioSemis) {
                            faseTexto = t('semis');
                        }
                        else if (fechaPartido >= inicioCuartos) {
                            faseTexto = t('cuartos');
                        }
                        else if (fechaPartido >= inicio16avos) {
                            faseTexto = t('octavos');
                        }
                        else if (comp.groups && comp.groups.name) {
                            faseTexto = `${t('grupo')} ${comp.groups.name}`;
                        }

                        return `
                            <div class="partido">
                                <p><strong>${home.team.displayName}</strong> ${home.score || 0} - ${away.score || 0} <strong>${away.team.displayName}</strong></p>
                                <p class="${estadoClase}">${t('estado')} ${estadoTexto}</p>
                                <p>${t('grupo')} ${faseTexto}</p>
                                ${golesHTML}
                            </div>
                        `;
                    } catch (err) {
                        console.error('Error en un partido:', err);
                        return `<div class="partido"><p>Error cargando este partido</p></div>`;
                    }
                }).join('');

            } catch (error) {
                console.error('Error general:', error);
                resultsDiv.innerHTML = `<p style="color:red">${t('error')}</p>`;
            }
        }

        async function mostrarProximosPartidos() {
            try {
                upcomingDiv.innerHTML = t('cargandoProximos');
                const res = await fetch(ESPN_URL + '?dates=20260629-20260705');
                const data = await res.json();

                const proximos = data.events.filter(e => e.status.type.state === 'pre').slice(0, 10);

                if (proximos.length === 0) {
                    upcomingDiv.innerHTML = `<p>${t('noProximos')}</p>`;
                    return;
                }

                upcomingDiv.innerHTML = proximos.map(match => {
                    const home = match.competitions[0].competitors.find(t => t.homeAway === 'home');
                    const away = match.competitions[0].competitors.find(t => t.homeAway === 'away');
                    const fecha = new Date(match.date).toLocaleString(idiomaActual === 'en'? 'en-US' : idiomaActual === 'de'? 'de-DE' : idiomaActual === 'pt'? 'pt-BR' : 'es-VE', {
                        weekday: 'short',
                        day: 'numeric',
                        month: 'short',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    return `
                        <div class="partido">
                            <p><strong>${home.team.displayName} vs ${away.team.displayName}</strong></p>
                            <p>${t('fecha')} ${fecha}</p>
                            <p>${match.competitions[0].venue?.fullName || t('estadio')}</p>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error próximos:', error);
                upcomingDiv.innerHTML = `<p style="color:red">${t('errorProximos')}</p>`;
            }
        }

        async function mostrarTablaPosiciones() {
            try {
                groupsDiv.innerHTML = t('cargandoGrupos');
                const res = await fetch(ESPN_GROUPS_URL);
                const data = await res.json();

                if (!data.children) {
                    groupsDiv.innerHTML = `<p>${t('errorTabla')}</p>`;
                    return;
                }

                let clasificados = [];
                let eliminados = [];

                data.children.forEach(grupo => {
                    const equipos = grupo.standings.entries;

                    equipos.forEach((equipo, idx) => {
                        const stats = equipo.stats;
                        const pj = stats.find(s => s.name === 'gamesPlayed')?.value || 0;
                        const pts = stats.find(s => s.name === 'points')?.value || 0;
                        const dg = stats.find(s => s.name === 'pointDifferential')?.value || 0;

                        const equipoData = {
                            nombre: equipo.team.displayName,
                            grupo: grupo.name,
                            pj: pj,
                            pts: pts,
                            dg: dg,
                            pos: idx + 1
                        };

                        if (pj >= 3) {
                            if (idx < 2) {
                                clasificados.push(equipoData);
                            } else {
                                eliminados.push(equipoData);
                            }
                        }
                        else if (pj === 2 && pts >= 6) {
                            clasificados.push(equipoData);
                        }
                        else if (pj === 2 && pts === 0) {
                            eliminados.push(equipoData);
                        }
                    });
                });

                clasificados.sort((a, b) => b.pts - a.pts || b.dg - a.dg);
                eliminados.sort((a, b) => b.pts - a.pts || b.dg - a.dg);

                let listasHTML = `
                    <div class="listas-clasificacion">
                        <div class="lista-clasificados">
                            <h3>✅ ${t('clasificados')} a Octavos (${clasificados.length})</h3>
                            ${clasificados.length > 0? `
                                <div class="equipos-grid">
                                    ${clasificados.map(e => `
                                        <div class="equipo-clasificado">
                                            <strong>${e.nombre}</strong>
                                            <span>${e.grupo} - ${e.pts} pts (${e.dg > 0? '+' : ''}${e.dg})</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `<p>Todavía no hay clasificados</p>`}
                        </div>

                        <div class="lista-eliminados">
                            <h3>❌ ${t('eliminados')} (${eliminados.length})</h3>
                            ${eliminados.length > 0? `
                                <div class="equipos-grid">
                                    ${eliminados.map(e => `
                                        <div class="equipo-eliminado">
                                            <strong>${e.nombre}</strong>
                                            <span>${e.grupo} - ${e.pts} pts (${e.dg > 0? '+' : ''}${e.dg})</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `<p>Todavía no hay eliminados</p>`}
                        </div>
                    </div>
                `;

                let tablasHTML = data.children.map(grupo => {
                    const equipos = grupo.standings.entries;

                    return `
                        <div class="grupo-tabla">
                            <h3>${grupo.name}</h3>
                            <table>
                                <thead>
                                    <tr>
                                        <th>${t('pos')}</th>
                                        <th>${t('equipo')}</th>
                                        <th>${t('pj')}</th>
                                        <th>${t('g')}</th>
                                        <th>${t('e')}</th>
                                        <th>${t('p')}</th>
                                        <th>${t('gf')}</th>
                                        <th>${t('gc')}</th>
                                        <th>${t('dg')}</th>
                                        <th>${t('pts')}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${equipos.map((equipo, idx) => {
                                        const stats = equipo.stats;
                                        const pj = stats.find(s => s.name === 'gamesPlayed')?.value || 0;
                                        const g = stats.find(s => s.name === 'wins')?.value || 0;
                                        const e = stats.find(s => s.name === 'ties')?.value || 0;
                                        const p = stats.find(s => s.name === 'losses')?.value || 0;
                                        const gf = stats.find(s => s.name === 'pointsFor')?.value || 0;
                                        const gc = stats.find(s => s.name === 'pointsAgainst')?.value || 0;
                                        const dg = stats.find(s => s.name === 'pointDifferential')?.value || 0;
                                        const pts = stats.find(s => s.name === 'points')?.value || 0;

                                        let clase = '';
                                        if (pj >= 2 && idx < 2) clase = 'clasificado';
                                        if (pj >= 2 && idx > 1 && pts < 3) clase = 'eliminado';

                                        return `
                                            <tr class="${clase}">
                                                <td>${idx + 1}</td>
                                                <td style="text-align:left">${equipo.team.displayName}</td>
                                                <td>${pj}</td>
                                                <td>${g}</td>
                                                <td>${e}</td>
                                                <td>${p}</td>
                                                <td>${gf}</td>
                                                <td>${gc}</td>
                                                <td>${dg}</td>
                                                <td><strong>${pts}</strong></td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }).join('');

                groupsDiv.innerHTML = listasHTML + tablasHTML;

            } catch (error) {
                console.error('Error tabla:', error);
                groupsDiv.innerHTML = `<p style="color:red">${t('errorTabla')}</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('idioma').value = idiomaActual;
            document.getElementById('idioma').addEventListener('change', cambiarIdioma);
            cambiarIdioma();
        });

        mostrarResultados();
        mostrarProximosPartidos();
        mostrarTablaPosiciones();

        setInterval(mostrarResultados, 45000);
    </script>
</body>
</html>
